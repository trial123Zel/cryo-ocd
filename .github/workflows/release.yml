# Builds prebuilt `cryo` binaries and validates the Dockerfile.
#
# - On a `v*` tag push: build all targets, then publish a GitHub Release with
#   the archives attached.
# - On a pull request that touches this workflow or the Dockerfile, and on
#   manual dispatch: build and upload the archives as run artifacts only — the
#   `release` job is skipped. This is the dry run.
#
# Action `uses:` refs are pinned to commit SHAs for supply-chain safety (H-1).
name: release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - 'Dockerfile'
      - '.dockerignore'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.triple }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            triple: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # rust-toolchain.toml pins the actual build toolchain (1.95.0); `stable`
      # here just primes rustup, mirroring build_and_test.yml.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.triple }}
          cache-on-failure: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="$(git rev-parse --short HEAD)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build cryo
        run: cargo build --release --locked --package cryo_cli

      - name: Package archive
        id: package
        shell: bash
        run: |
          name="cryo-${{ steps.version.outputs.version }}-${{ matrix.triple }}"
          mkdir "${name}"
          if [[ "${{ matrix.os }}" == windows-latest ]]; then
            cp target/release/cryo.exe "${name}/"
          else
            cp target/release/cryo "${name}/"
          fi
          cp LICENSE-MIT LICENSE-APACHE README.md "${name}/"
          if [[ "${{ matrix.archive }}" == zip ]]; then
            7z a "${name}.zip" "${name}"
            echo "asset=${name}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "${name}.tar.gz" "${name}"
            echo "asset=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cryo-${{ matrix.triple }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build the cryo image
        run: docker build --tag cryo:ci .

      - name: Smoke-test the image
        run: docker run --rm cryo:ci --version

  release:
    name: publish release
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: cryo-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # A SemVer pre-release tag carries a hyphen (e.g. v0.4.0-rc.1).
          prerelease=""
          if [[ "${tag}" == *-* ]]; then
            prerelease="--prerelease"
          fi
          gh release create "${tag}" dist/* \
            --title "${tag}" \
            --generate-notes \
            ${prerelease}
