name: Data Validation

# cryo_test data-correctness validation against a live node.
#
# This job runs on a self-hosted runner on the maintainer's private network.
# Because that runner can reach private infrastructure, it must never execute
# for untrusted actors or fork pull requests. See:
#   docs/adr/0004-validation-strategy.md
#   docs/adr/0005-secret-handling.md
#
# The job builds `cryo` from the pull request and from `main`, runs the
# `cryo_test` harness against a live node, and diffs the Parquet output
# column-by-column. A pull request that does not change cryo's output passes;
# one that does change it surfaces the diff for review. `main` is itself gated
# by this job, so it stays a known-good comparison point — there is no frozen
# baseline to maintain.
#
# Compiled artifacts are cached in a persistent CARGO_TARGET_DIR on the
# runner's disk (the runner host persists between jobs), so the dependency
# tree is not recompiled from scratch each run — only changed crates rebuild.

on:
  pull_request:
  workflow_dispatch:

jobs:
  cryo-test:
    name: cryo_test data diff
    # Lockdown: run only for the maintainer's own branches in this repository.
    if: >-
      github.actor == 'trial123Zel' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted]
    timeout-minutes: 90
    steps:
      - name: Check out the pull request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr

      - name: Check out main (comparison point)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          path: base

      - name: Check runner configuration
        run: |
          # RETH_RPC_URL is provided by the runner host (e.g. the runner's
          # own .env), never stored on GitHub. See ADR-0004 / ADR-0005.
          if [ -z "${RETH_RPC_URL:-}" ]; then
            echo "::error::RETH_RPC_URL is not set on the self-hosted runner."
            exit 1
          fi
          echo "runner configured (node endpoint intentionally not printed)"

      - name: Build cryo from the pull request
        run: |
          # Persistent build cache: the pull-request and main builds share one
          # CARGO_TARGET_DIR on the runner's disk, so registry crates (alloy,
          # polars, ...) compile once and are reused across runs. The fresh
          # `pr`/`base` checkouts otherwise force a cold build every time.
          mkdir -p "$HOME/.cache/cryo-ci"
          target="$HOME/.cache/cryo-ci/target"
          # reset the cache if it outgrows the runner's disk headroom
          if [ -d "$target" ] && [ "$(du -sm "$target" | cut -f1)" -gt 6000 ]; then
            echo "build cache exceeds 6 GB — clearing it for a cold rebuild"
            rm -rf "$target"
          fi
          export CARGO_TARGET_DIR="$target"
          cargo build --release -p cryo_cli --manifest-path pr/Cargo.toml
          # the binary path is shared, so copy it out before the main build
          cp "$target/release/cryo" "$RUNNER_TEMP/cryo-pr"

      - name: Build cryo from main
        run: |
          export CARGO_TARGET_DIR="$HOME/.cache/cryo-ci/target"
          cargo build --release -p cryo_cli --manifest-path base/Cargo.toml
          cp "$CARGO_TARGET_DIR/release/cryo" "$RUNNER_TEMP/cryo-main"

      - name: cryo_test data diff (pull request vs main)
        run: |
          cd pr/crates/python/python/cryo_test
          # The cryo_test harness exits 0 regardless of the result, so the
          # outcome is read from its "Total differences" summary line.
          "$HOME/cryo-ocd-baseline/venv/bin/python" -m cryo_test \
            --executable \
              main="$RUNNER_TEMP/cryo-main" \
              pr="$RUNNER_TEMP/cryo-pr" \
            --rpc "$RETH_RPC_URL" \
            --dir "$RUNNER_TEMP/cryo_test_diff" \
            2>&1 | tee "$RUNNER_TEMP/cryo_test.log"
          if ! grep -qE "Total differences: 0([^0-9]|$)" "$RUNNER_TEMP/cryo_test.log"; then
            echo "::error::cryo_test found data differences between this pull request and main — review the diff above."
            exit 1
          fi
          echo "cryo_test: no data differences between the pull request and main"
