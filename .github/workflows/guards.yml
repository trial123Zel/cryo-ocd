name: Guards

# Repository safety guards: secret scanning and license-file integrity.
# These run on cloud runners and are safe for pull requests from forks.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  license-guard:
    name: License files unchanged
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSE-MIT and LICENSE-APACHE are unmodified
        # The original license files and copyright notices must never change.
        # See docs/adr/0001-fork-charter.md.
        run: sha256sum -c .github/license-checksums.sha256
